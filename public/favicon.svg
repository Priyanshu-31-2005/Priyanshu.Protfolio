<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#1E1E1C" />
    </linearGradient>
  </defs>
  <!-- Rounded premium card shape -->
  <rect width="100" height="100" rx="30" fill="url(#bg-grad)" />
  <!-- Subtle inner border with emerald accent -->
  <rect x="3" y="3" width="94" height="94" rx="27" fill="none" stroke="#00D26A" stroke-width="4.5" stroke-linecap="round" />
  <!-- Monogram text styled in a high-tech premium font representation -->
  <text x="49%" y="63%" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="44" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">PP</text>
</svg>
